<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 224" width="860" height="224">
  <defs>

    <!-- Outer glow blur -->
    <filter id="glow1" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/></feMerge>
    </filter>
    <filter id="glow2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/></feMerge>
    </filter>

    <!-- Card glass fills -->
    <linearGradient id="glass1" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#9d5cff" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#3d1a8a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#110822" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="glass2" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#c678dd" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#6e40c9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#110822" stop-opacity="0.16"/>
    </linearGradient>

    <!-- Top-edge shine (glass highlight) -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="45%"  stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Card border gradients -->
    <linearGradient id="bord1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9d5cff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6e40c9" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="bord2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c678dd" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Divider lines inside cards -->
    <linearGradient id="div1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6e40c9" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#6e40c9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6e40c9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="div2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c678dd" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#c678dd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c678dd" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip paths to keep content inside rounded cards -->
    <clipPath id="clip1">
      <rect x="8"   y="8" width="420" height="208" rx="20"/>
    </clipPath>
    <clipPath id="clip2">
      <rect x="432" y="8" width="420" height="208" rx="20"/>
    </clipPath>

    <style>
      .g1  { animation: glowp1 4s ease-in-out infinite; }
      .g2  { animation: glowp2 4s ease-in-out 1.8s infinite; }
      .c1  { animation: rise 1s 0.1s cubic-bezier(.16,1,.3,1) both; }
      .c2  { animation: rise 1s 0.35s cubic-bezier(.16,1,.3,1) both; }
      .btn { animation: btnp 3s ease-in-out infinite; }
      @keyframes glowp1 { 0%,100%{opacity:.40} 50%{opacity:.80} }
      @keyframes glowp2 { 0%,100%{opacity:.35} 50%{opacity:.75} }
      @keyframes rise   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
      @keyframes btnp   { 0%,100%{opacity:.7} 50%{opacity:1} }
    </style>
  </defs>

  <!-- Dark base -->
  <rect width="860" height="224" fill="#0a0a15"/>

  <!-- ═══════════════ CARD 1 GLOW ═══════════════ -->
  <rect class="g1" x="18" y="18" width="400" height="188" rx="16"
        fill="#6e40c9" filter="url(#glow1)" opacity="0.35"/>

  <!-- ═══════════════ CARD 1 ═══════════════════ -->
  <g class="c1">
    <!-- Glass body -->
    <rect x="8" y="8" width="420" height="208" rx="20" fill="url(#glass1)"/>
    <!-- Top shine clipped -->
    <rect x="8" y="8" width="420" height="90" fill="url(#shine)" clip-path="url(#clip1)"/>
    <!-- Border -->
    <rect x="8" y="8" width="420" height="208" rx="20" fill="none" stroke="url(#bord1)" stroke-width="1.3"/>

    <!-- Icon box -->
    <rect x="26" y="24" width="36" height="36" rx="10" fill="#6e40c9" opacity="0.25"/>
    <rect x="26" y="24" width="36" height="36" rx="10" fill="none" stroke="#9d5cff" stroke-width="0.9" opacity="0.7"/>
    <text x="44" y="47" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="16" fill="#9d5cff" font-weight="700">ISO</text>

    <!-- Repo name -->
    <text x="72" y="38"
          font-family="Arial Black,Arial,Helvetica,sans-serif"
          font-size="18" font-weight="900" fill="#f0f6fc" letter-spacing="-0.5">XeroBuild</text>

    <!-- Sub-tag pill -->
    <rect x="72" y="44" width="118" height="15" rx="5" fill="#6e40c9" opacity="0.22"/>
    <text x="131" y="55" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="9" fill="#9d5cff" letter-spacing="1.5">ARCH ISO BUILDER</text>

    <!-- Divider -->
    <rect x="26" y="72" width="390" height="1" fill="url(#div1)"/>

    <!-- Description -->
    <text x="26" y="96"  font-family="Arial,Helvetica,sans-serif" font-size="12.5" fill="#7a7a9d">Automated build pipeline for XeroLinux releases.</text>
    <text x="26" y="114" font-family="Arial,Helvetica,sans-serif" font-size="12.5" fill="#7a7a9d">Custom scripts for ISO assembly, package</text>
    <text x="26" y="132" font-family="Arial,Helvetica,sans-serif" font-size="12.5" fill="#7a7a9d">selection &amp; full system configuration.</text>

    <!-- Bottom divider -->
    <rect x="26" y="152" width="390" height="1" fill="url(#div1)" opacity="0.5"/>

    <!-- Language pill -->
    <rect x="26" y="164" width="58" height="22" rx="8" fill="#6e40c9" opacity="0.2"/>
    <rect x="26" y="164" width="58" height="22" rx="8" fill="none" stroke="#6e40c9" stroke-width="0.8" opacity="0.55"/>
    <text x="55" y="179" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="10" fill="#9d5cff">Shell</text>

    <!-- Stars -->
    <text x="98"  y="179" font-family="Arial,sans-serif" font-size="14" fill="#6e40c9">★</text>
    <text x="114" y="179" font-family="'Courier New',Courier,monospace" font-size="10" fill="#555570">Stars</text>

    <!-- Forks -->
    <text x="166" y="179" font-family="Arial,sans-serif" font-size="11" fill="#8b5cf6">◈</text>
    <text x="180" y="179" font-family="'Courier New',Courier,monospace" font-size="10" fill="#555570">Forks</text>

    <!-- View button -->
    <rect class="btn" x="318" y="161" width="96" height="28" rx="10"
          fill="#6e40c9" opacity="0.22"/>
    <rect class="btn" x="318" y="161" width="96" height="28" rx="10"
          fill="none" stroke="#9d5cff" stroke-width="0.9" opacity="0.7"/>
    <text x="366" y="179" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="10" fill="#9d5cff" letter-spacing="1">VIEW REPO →</text>
  </g>

  <!-- ═══════════════ CARD 2 GLOW ═══════════════ -->
  <rect class="g2" x="442" y="18" width="400" height="188" rx="16"
        fill="#c678dd" filter="url(#glow2)" opacity="0.30"/>

  <!-- ═══════════════ CARD 2 ═══════════════════ -->
  <g class="c2">
    <!-- Glass body -->
    <rect x="432" y="8" width="420" height="208" rx="20" fill="url(#glass2)"/>
    <!-- Top shine clipped -->
    <rect x="432" y="8" width="420" height="90" fill="url(#shine)" clip-path="url(#clip2)"/>
    <!-- Border -->
    <rect x="432" y="8" width="420" height="208" rx="20" fill="none" stroke="url(#bord2)" stroke-width="1.3"/>

    <!-- Icon box -->
    <rect x="450" y="24" width="36" height="36" rx="10" fill="#c678dd" opacity="0.2"/>
    <rect x="450" y="24" width="36" height="36" rx="10" fill="none" stroke="#c678dd" stroke-width="0.9" opacity="0.65"/>
    <text x="468" y="47" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="16" fill="#c678dd" font-weight="700">KDE</text>

    <!-- Repo name -->
    <text x="496" y="38"
          font-family="Arial Black,Arial,Helvetica,sans-serif"
          font-size="18" font-weight="900" fill="#f0f6fc" letter-spacing="-0.5">desktop-config</text>

    <!-- Sub-tag pill -->
    <rect x="496" y="44" width="130" height="15" rx="5" fill="#c678dd" opacity="0.18"/>
    <text x="561" y="55" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="9" fill="#c678dd" letter-spacing="1.5">KDE PLASMA DOTFILES</text>

    <!-- Divider -->
    <rect x="450" y="72" width="390" height="1" fill="url(#div2)"/>

    <!-- Description -->
    <text x="450" y="96"  font-family="Arial,Helvetica,sans-serif" font-size="12.5" fill="#7a7a9d">Complete KDE Plasma 6 rice — configs, themes,</text>
    <text x="450" y="114" font-family="Arial,Helvetica,sans-serif" font-size="12.5" fill="#7a7a9d">widgets &amp; scripts for the full XeroLinux</text>
    <text x="450" y="132" font-family="Arial,Helvetica,sans-serif" font-size="12.5" fill="#7a7a9d">desktop experience.</text>

    <!-- Bottom divider -->
    <rect x="450" y="152" width="390" height="1" fill="url(#div2)" opacity="0.5"/>

    <!-- Language pill -->
    <rect x="450" y="164" width="66" height="22" rx="8" fill="#c678dd" opacity="0.16"/>
    <rect x="450" y="164" width="66" height="22" rx="8" fill="none" stroke="#c678dd" stroke-width="0.8" opacity="0.5"/>
    <text x="483" y="179" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="10" fill="#c678dd">Config</text>

    <!-- Stars -->
    <text x="530" y="179" font-family="Arial,sans-serif" font-size="14" fill="#c678dd">★</text>
    <text x="546" y="179" font-family="'Courier New',Courier,monospace" font-size="10" fill="#555570">Stars</text>

    <!-- Forks -->
    <text x="598" y="179" font-family="Arial,sans-serif" font-size="11" fill="#8b5cf6">◈</text>
    <text x="612" y="179" font-family="'Courier New',Courier,monospace" font-size="10" fill="#555570">Forks</text>

    <!-- View button -->
    <rect class="btn" x="742" y="161" width="96" height="28" rx="10"
          fill="#c678dd" opacity="0.18"/>
    <rect class="btn" x="742" y="161" width="96" height="28" rx="10"
          fill="none" stroke="#c678dd" stroke-width="0.9" opacity="0.65"/>
    <text x="790" y="179" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="10" fill="#c678dd" letter-spacing="1">VIEW REPO →</text>
  </g>

</svg>
