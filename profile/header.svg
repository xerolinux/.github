<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="20%"  stop-color="#1d99f3"/>
      <stop offset="50%"  stop-color="#3fb950"/>
      <stop offset="80%"  stop-color="#1d99f3"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="titleGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bar { animation: barPulse 4s ease-in-out infinite; }
      .tag { animation: tagFade 3s ease-in-out infinite; }
      @keyframes barPulse { 0%,100%{opacity:.5} 50%{opacity:1} }
      @keyframes tagFade  { 0%,100%{opacity:.7} 50%{opacity:1} }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect class="bar" x="0" y="0" width="900" height="3" fill="url(#accentLine)"/>

  <!-- Left bracket decoration -->
  <text x="48" y="112" font-family="'Courier New',Courier,monospace" font-size="80"
        fill="#21262d" font-weight="700">{</text>
  <!-- Right bracket -->
  <text x="816" y="112" font-family="'Courier New',Courier,monospace" font-size="80"
        fill="#21262d" font-weight="700">}</text>

  <!-- Tag line above title -->
  <text class="tag" x="450" y="68" text-anchor="middle"
        font-family="'Courier New',Courier,monospace" font-size="12"
        fill="#1d99f3" letter-spacing="4">// config dump · kde plasma rice · dotfiles</text>

  <!-- Main title -->
  <text x="450" y="122" text-anchor="middle"
        font-family="'Courier New',Courier,monospace" font-size="68" font-weight="900"
        fill="#f0f6fc" letter-spacing="8" filter="url(#titleGlow)">XEROLINUX</text>

  <!-- Underline accent -->
  <rect class="bar" x="200" y="134" width="500" height="2" rx="1" fill="url(#accentLine)"/>

  <!-- Corner brackets — top left -->
  <polyline points="20,20 20,50 50,50" fill="none" stroke="#30363d" stroke-width="2"/>
  <!-- Corner brackets — top right -->
  <polyline points="880,20 880,50 850,50" fill="none" stroke="#30363d" stroke-width="2"/>
  <!-- Corner brackets — bottom left -->
  <polyline points="20,180 20,150 50,150" fill="none" stroke="#30363d" stroke-width="2"/>
  <!-- Corner brackets — bottom right -->
  <polyline points="880,180 880,150 850,150" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- Bottom accent bar -->
  <rect class="bar" x="0" y="197" width="900" height="3" fill="url(#accentLine)"/>
</svg>
