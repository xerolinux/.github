<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- Sky: deep purple to magenta horizon -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#06000f"/>
      <stop offset="65%"  stop-color="#160028"/>
      <stop offset="100%" stop-color="#4a0060"/>
    </linearGradient>
    <!-- Ground: purple-black -->
    <linearGradient id="gnd" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1c0035"/>
      <stop offset="100%" stop-color="#040008"/>
    </linearGradient>
    <!-- Sun body gradient -->
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffe566"/>
      <stop offset="45%"  stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ff0077"/>
    </linearGradient>
    <!-- Title gradient cyan→magenta→cyan -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00eeff"/>
      <stop offset="48%"  stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#00eeff"/>
    </linearGradient>
    <!-- Edge neon bar gradient -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#06000f"/>
      <stop offset="25%"  stop-color="#00eeff"/>
      <stop offset="50%"  stop-color="#ff00ff"/>
      <stop offset="75%"  stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#06000f"/>
    </linearGradient>
    <!-- Horizon halo -->
    <radialGradient id="halo" cx="50%" cy="100%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ff00cc" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#ff00cc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff00cc" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip sun to horizon -->
    <clipPath id="sunClip">
      <rect x="0" y="0" width="900" height="162"/>
    </clipPath>
    <!-- Glow filters -->
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBloom" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gridGlow" x="-5%" y="-100%" width="110%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sunBloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .glitch {
        animation: glitch 6s ease-in-out infinite;
      }
      .sunPulse  { animation: sPulse  3.5s ease-in-out infinite; }
      .haloPulse { animation: hPulse  3.5s ease-in-out infinite; }
      .scan      { animation: scanAnim 12s linear infinite; }
      .twA { animation: tw 2.3s ease-in-out infinite; }
      .twB { animation: tw 3.8s ease-in-out infinite; }
      .twC { animation: tw 1.7s ease-in-out infinite; }
      .twD { animation: tw 4.5s ease-in-out infinite; }
      .twE { animation: tw 2.9s ease-in-out infinite; }
      .twF { animation: tw 5.1s ease-in-out infinite; }
      .twG { animation: tw 1.4s ease-in-out infinite; }
      .twH { animation: tw 3.2s ease-in-out infinite; }
      @keyframes glitch {
        0%,82%,100% { transform:translateX(0) skewX(0deg); opacity:1; }
        84%  { transform:translateX(-7px) skewX(-1.5deg); opacity:0.85; filter:hue-rotate(30deg); }
        86%  { transform:translateX(7px)  skewX(1.5deg);  opacity:0.9;  }
        88%  { transform:translateX(-4px) skewX(-0.5deg); opacity:0.95; filter:hue-rotate(-20deg); }
        90%  { transform:translateX(0); opacity:1; filter:none; }
      }
      @keyframes sPulse   { 0%,100%{opacity:.8}  50%{opacity:1}   }
      @keyframes hPulse   { 0%,100%{opacity:.4}  50%{opacity:.85} }
      @keyframes scanAnim { 0%{transform:translateY(-320px)} 100%{transform:translateY(640px)} }
      @keyframes tw       { 0%,100%{opacity:.1}  50%{opacity:.95} }
    </style>
  </defs>

  <!-- ░░ SKY + GROUND ░░ -->
  <rect width="900" height="162" fill="url(#sky)"/>
  <rect y="162" width="900" height="158" fill="url(#gnd)"/>

  <!-- ░░ HORIZON HALO ░░ -->
  <ellipse class="haloPulse" cx="450" cy="162" rx="420" ry="60" fill="url(#halo)"/>

  <!-- ░░ SUN (clipped to sky) ░░ -->
  <g clip-path="url(#sunClip)" class="sunPulse">
    <circle cx="450" cy="162" r="72" fill="url(#sunGrad)" filter="url(#sunBloom)"/>
    <!-- Stripe slots cut into sun (black bars, evenly spaced from center up) -->
    <rect x="376" y="150" width="148" height="6"  fill="#06000f"/>
    <rect x="376" y="140" width="148" height="5"  fill="#06000f"/>
    <rect x="376" y="130" width="148" height="5"  fill="#06000f"/>
    <rect x="376" y="119" width="148" height="6"  fill="#06000f"/>
  </g>

  <!-- ░░ PERSPECTIVE GRID — horizontal lines ░░ -->
  <g filter="url(#gridGlow)">
    <line x1="0" y1="170" x2="900" y2="170" stroke="#ff00ff" stroke-width="1.0" opacity="0.75"/>
    <line x1="0" y1="188" x2="900" y2="188" stroke="#ff00ff" stroke-width="0.9" opacity="0.65"/>
    <line x1="0" y1="211" x2="900" y2="211" stroke="#ff00ff" stroke-width="0.8" opacity="0.55"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#ff00ff" stroke-width="0.7" opacity="0.45"/>
    <line x1="0" y1="276" x2="900" y2="276" stroke="#ff00ff" stroke-width="0.6" opacity="0.35"/>
  </g>

  <!-- ░░ PERSPECTIVE GRID — vertical lines converging at (450,162) ░░ -->
  <g filter="url(#gridGlow)">
    <line x1="450" y1="162" x2="0"   y2="320" stroke="#00eeff" stroke-width="0.9" opacity="0.55"/>
    <line x1="450" y1="162" x2="100" y2="320" stroke="#00eeff" stroke-width="0.8" opacity="0.50"/>
    <line x1="450" y1="162" x2="205" y2="320" stroke="#00eeff" stroke-width="0.8" opacity="0.50"/>
    <line x1="450" y1="162" x2="310" y2="320" stroke="#00eeff" stroke-width="0.8" opacity="0.50"/>
    <line x1="450" y1="162" x2="450" y2="320" stroke="#00eeff" stroke-width="1.0" opacity="0.65"/>
    <line x1="450" y1="162" x2="590" y2="320" stroke="#00eeff" stroke-width="0.8" opacity="0.50"/>
    <line x1="450" y1="162" x2="695" y2="320" stroke="#00eeff" stroke-width="0.8" opacity="0.50"/>
    <line x1="450" y1="162" x2="800" y2="320" stroke="#00eeff" stroke-width="0.8" opacity="0.50"/>
    <line x1="450" y1="162" x2="900" y2="320" stroke="#00eeff" stroke-width="0.9" opacity="0.55"/>
  </g>

  <!-- ░░ STARS ░░ -->
  <circle class="twA" cx="48"  cy="22"  r="1.5" fill="#ffffff"/>
  <circle class="twB" cx="140" cy="48"  r="1.2" fill="#00eeff"/>
  <circle class="twC" cx="240" cy="16"  r="1.6" fill="#ffffff"/>
  <circle class="twD" cx="330" cy="58"  r="1.0" fill="#ff88ff"/>
  <circle class="twE" cx="520" cy="28"  r="1.3" fill="#ffffff"/>
  <circle class="twF" cx="620" cy="14"  r="1.5" fill="#00eeff"/>
  <circle class="twG" cx="750" cy="44"  r="1.1" fill="#ffffff"/>
  <circle class="twH" cx="850" cy="20"  r="1.4" fill="#ff88ff"/>
  <circle class="twA" cx="90"  cy="90"  r="0.9" fill="#ffffff"/>
  <circle class="twC" cx="800" cy="85"  r="1.0" fill="#00eeff"/>
  <circle class="twE" cx="410" cy="40"  r="0.8" fill="#ffffff"/>
  <circle class="twB" cx="670" cy="72"  r="1.1" fill="#ff88ff"/>
  <circle class="twD" cx="180" cy="100" r="0.8" fill="#ffffff"/>
  <circle class="twF" cx="870" cy="110" r="1.0" fill="#00eeff"/>
  <circle class="twG" cx="30"  cy="120" r="0.9" fill="#ffffff"/>

  <!-- ░░ GLITCH TITLE ░░ -->
  <g class="glitch">
    <!-- Glow backing -->
    <text x="450" y="112" font-size="60" font-weight="900" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" letter-spacing="10"
          fill="#ff00ff" opacity="0.25" filter="url(#bloom)">XEROLINUX</text>
    <!-- Main -->
    <text x="450" y="112" font-size="60" font-weight="900" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" letter-spacing="10"
          fill="url(#titleGrad)" filter="url(#softBloom)">XEROLINUX</text>
  </g>

  <!-- ░░ SUBTITLE ░░ -->
  <text x="450" y="143" font-size="12" text-anchor="middle"
        font-family="'Courier New',Courier,monospace" letter-spacing="5"
        fill="#cc44ff" opacity="0.9">CONFIG DUMP  ·  KDE PLASMA RICE  ·  DOTFILES</text>

  <!-- ░░ TOP + BOTTOM NEON BARS ░░ -->
  <rect x="0" y="0"   width="900" height="2" fill="url(#barGrad)" opacity="0.9"/>
  <rect x="0" y="318" width="900" height="2" fill="url(#barGrad)" opacity="0.9"/>

  <!-- ░░ MOVING SCANLINE ░░ -->
  <rect class="scan" x="0" y="0" width="900" height="2" fill="white" opacity="0.03"/>
</svg>
