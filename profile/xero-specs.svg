<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d0018"/>
      <stop offset="100%" stop-color="#06000f"/>
    </linearGradient>
    <linearGradient id="headerBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#06000f"/>
      <stop offset="30%"  stop-color="#ff00ff"/>
      <stop offset="70%"  stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#06000f"/>
    </linearGradient>
    <filter id="fg" x="-5%" y="-80%" width="110%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .l1  { animation: appear 0s  0.2s both; opacity:0; }
      .l2  { animation: appear 0s  0.7s both; opacity:0; }
      .l3  { animation: appear 0s  1.1s both; opacity:0; }
      .l4  { animation: appear 0s  1.5s both; opacity:0; }
      .l5  { animation: appear 0s  1.9s both; opacity:0; }
      .l6  { animation: appear 0s  2.3s both; opacity:0; }
      .l7  { animation: appear 0s  2.7s both; opacity:0; }
      .l8  { animation: appear 0s  3.1s both; opacity:0; }
      .l9  { animation: appear 0s  3.5s both; opacity:0; }
      .l10 { animation: appear 0s  3.9s both; opacity:0; }
      .cursor { animation: blink 1s step-end infinite; }
      @keyframes appear { to { opacity:1; } }
      @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
  </defs>

  <!-- Card background -->
  <rect width="860" height="300" rx="10" fill="url(#cardBg)"/>

  <!-- Border -->
  <rect width="860" height="300" rx="10" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.4"/>
  <!-- Inner border glow -->
  <rect x="1" y="1" width="858" height="298" rx="9" fill="none" stroke="#00eeff" stroke-width="0.5" opacity="0.2"/>

  <!-- Header bar -->
  <rect x="0" y="0"   width="860" height="2" rx="1" fill="url(#headerBar)"/>
  <rect x="0" y="298" width="860" height="2" rx="1" fill="url(#headerBar)"/>

  <!-- Title -->
  <text x="430" y="32" font-size="11" font-weight="700" text-anchor="middle"
        font-family="'Courier New',Courier,monospace" letter-spacing="6"
        fill="#ff00ff" filter="url(#fg)">── SYSTEM SPECS ──</text>

  <!-- Divider line -->
  <line x1="40" y1="44" x2="820" y2="44" stroke="#ff00ff" stroke-width="0.5" opacity="0.4"/>

  <!-- LEFT COLUMN -->
  <!-- Labels -->
  <g font-family="'Courier New',Courier,monospace" font-size="13" fill="#6600aa">
    <text x="60"  y="74"  class="l1">OS</text>
    <text x="60"  y="102" class="l2">Distro</text>
    <text x="60"  y="130" class="l3">DE</text>
    <text x="60"  y="158" class="l4">Compositor</text>
    <text x="60"  y="186" class="l5">Display</text>
    <text x="60"  y="214" class="l6">Shell</text>
    <text x="60"  y="242" class="l7">Terminal</text>
  </g>

  <!-- Dots -->
  <g font-family="'Courier New',Courier,monospace" font-size="13" fill="#330055">
    <text x="200" y="74"  class="l1">............</text>
    <text x="200" y="102" class="l2">............</text>
    <text x="200" y="130" class="l3">............</text>
    <text x="200" y="158" class="l4">............</text>
    <text x="200" y="186" class="l5">............</text>
    <text x="200" y="214" class="l6">............</text>
    <text x="200" y="242" class="l7">............</text>
  </g>

  <!-- Values -->
  <g font-family="'Courier New',Courier,monospace" font-size="13" fill="#00eeff">
    <text x="310" y="74"  class="l1">Linux</text>
    <text x="310" y="102" class="l2">Arch Linux x86_64</text>
    <text x="310" y="130" class="l3">KDE Plasma 6</text>
    <text x="310" y="158" class="l4">KWin</text>
    <text x="310" y="186" class="l5">Wayland</text>
    <text x="310" y="214" class="l6">Zsh</text>
    <text x="310" y="242" class="l7">Konsole</text>
  </g>

  <!-- RIGHT COLUMN -->
  <!-- Labels -->
  <g font-family="'Courier New',Courier,monospace" font-size="13" fill="#6600aa">
    <text x="510" y="74"  class="l3">Theming</text>
    <text x="510" y="102" class="l4">Icons</text>
    <text x="510" y="130" class="l5">AUR Helper</text>
    <text x="510" y="158" class="l6">Dot Manager</text>
    <text x="510" y="186" class="l7">Launcher</text>
    <text x="510" y="214" class="l8">Fonts</text>
    <text x="510" y="242" class="l9">Colors</text>
  </g>

  <!-- Dots right -->
  <g font-family="'Courier New',Courier,monospace" font-size="13" fill="#330055">
    <text x="638" y="74"  class="l3">......</text>
    <text x="638" y="102" class="l4">......</text>
    <text x="638" y="130" class="l5">......</text>
    <text x="638" y="158" class="l6">......</text>
    <text x="638" y="186" class="l7">......</text>
    <text x="638" y="214" class="l8">......</text>
    <text x="638" y="242" class="l9">......</text>
  </g>

  <!-- Values right -->
  <g font-family="'Courier New',Courier,monospace" font-size="13" fill="#ff00ff">
    <text x="704" y="74"  class="l3">Kvantum</text>
    <text x="704" y="102" class="l4">Papirus</text>
    <text x="704" y="130" class="l5">Yay</text>
    <text x="704" y="158" class="l6">GNU Stow</text>
    <text x="704" y="186" class="l7">KRunner</text>
    <text x="704" y="214" class="l8">Hack Nerd Font</text>
    <text x="704" y="242" class="l9">One Dark</text>
  </g>

  <!-- Center divider -->
  <line x1="490" y1="52" x2="490" y2="260" stroke="#ff00ff" stroke-width="0.5" opacity="0.25"/>

  <!-- Bottom prompt line -->
  <text x="60" y="278" font-family="'Courier New',Courier,monospace" font-size="12" fill="#ff00ff" class="l10" opacity="0.7">[ xero@arch ~ ]$</text>
  <rect class="cursor l10" x="202" y="265" width="8" height="14" fill="#00eeff" opacity="0.9"/>
</svg>
