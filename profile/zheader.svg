<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>

    <!-- Nebula orb gradients -->
    <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6e40c9" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#0a0a15" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9d5cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a0a15" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3d1a8a" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#0a0a15" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent bar gradient -->
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0a15"/>
      <stop offset="30%"  stop-color="#6e40c9"/>
      <stop offset="70%"  stop-color="#9d5cff"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </linearGradient>

    <!-- Purple glow for title -->
    <filter id="pglow" x="-25%" y="-80%" width="150%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/></feMerge>
    </filter>

    <style>
      /* Nebula orbs */
      .n1 { animation: npulse  9s ease-in-out infinite; }
      .n2 { animation: npulse 13s ease-in-out infinite 2s; }
      .n3 { animation: npulse 11s ease-in-out infinite 5s; }

      /* Accent lines */
      .ab { animation: linep 5s ease-in-out infinite; }

      /* Text entrance */
      .title { animation: rise 1.4s 0.2s cubic-bezier(.16,1,.3,1) both; }
      .sub   { animation: rise 1.4s 0.6s cubic-bezier(.16,1,.3,1) both; }
      .tag   { animation: rise 1.4s 1.0s cubic-bezier(.16,1,.3,1) both; }

      /* Floating particles */
      .p1  { animation: fl  7s 0.0s ease-in-out infinite; }
      .p2  { animation: fl  9s 1.2s ease-in-out infinite; }
      .p3  { animation: fl  6s 2.4s ease-in-out infinite; }
      .p4  { animation: fl  8s 0.8s ease-in-out infinite; }
      .p5  { animation: fl 11s 3.6s ease-in-out infinite; }
      .p6  { animation: fl  7s 1.9s ease-in-out infinite; }
      .p7  { animation: fl  9s 4.3s ease-in-out infinite; }
      .p8  { animation: fl  6s 0.5s ease-in-out infinite; }
      .p9  { animation: fl 10s 2.8s ease-in-out infinite; }
      .p10 { animation: fl  8s 5.1s ease-in-out infinite; }

      /* Corner marks */
      .cm  { animation: linep 4s ease-in-out infinite; opacity: 0.35; }

      @keyframes npulse { 0%,100%{opacity:.70} 50%{opacity:1} }
      @keyframes linep  { 0%,100%{opacity:.55} 50%{opacity:1} }
      @keyframes rise   {
        from { opacity:0; transform:translateY(14px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes fl {
        0%,100% { transform:translateY(0);    opacity:0.45; }
        50%     { transform:translateY(-14px); opacity:1;   }
      }
    </style>
  </defs>

  <!-- ── BACKGROUND ─────────────────────────── -->
  <rect width="900" height="200" fill="#0a0a15"/>

  <!-- ── NEBULA ORBS ─────────────────────────── -->
  <ellipse class="n1" cx="180" cy="150" rx="280" ry="190" fill="url(#neb1)"/>
  <ellipse class="n2" cx="720" cy="55"  rx="250" ry="165" fill="url(#neb2)"/>
  <ellipse class="n3" cx="460" cy="105" rx="210" ry="130" fill="url(#neb3)"/>

  <!-- ── FLOATING PARTICLES ──────────────────── -->
  <circle class="p1"  cx="72"  cy="38"  r="2"   fill="#9d5cff" opacity="0.55"/>
  <circle class="p2"  cx="155" cy="168" r="1.5" fill="#c4a0ff" opacity="0.65"/>
  <circle class="p3"  cx="300" cy="22"  r="2.5" fill="#6e40c9" opacity="0.75"/>
  <circle class="p4"  cx="400" cy="175" r="1.5" fill="#9d5cff" opacity="0.55"/>
  <circle class="p5"  cx="510" cy="18"  r="2"   fill="#c4a0ff" opacity="0.50"/>
  <circle class="p6"  cx="620" cy="165" r="2.5" fill="#6e40c9" opacity="0.65"/>
  <circle class="p7"  cx="755" cy="28"  r="2"   fill="#9d5cff" opacity="0.60"/>
  <circle class="p8"  cx="845" cy="152" r="1.5" fill="#c4a0ff" opacity="0.55"/>
  <circle class="p9"  cx="44"  cy="128" r="1.5" fill="#9d5cff" opacity="0.45"/>
  <circle class="p10" cx="868" cy="68"  r="2"   fill="#c4a0ff" opacity="0.50"/>

  <!-- ── ACCENT LINES ────────────────────────── -->
  <rect class="ab" x="0" y="0"   width="900" height="2" fill="url(#bar)"/>
  <rect class="ab" x="0" y="198" width="900" height="2" fill="url(#bar)" opacity="0.5"/>

  <!-- ── CORNER MARKS ───────────────────────── -->
  <polyline class="cm" points="18,18 18,40 40,40"  fill="none" stroke="#6e40c9" stroke-width="1.5"/>
  <polyline class="cm" points="882,18 882,40 860,40"  fill="none" stroke="#6e40c9" stroke-width="1.5"/>
  <polyline class="cm" points="18,182 18,160 40,160"  fill="none" stroke="#6e40c9" stroke-width="1.5"/>
  <polyline class="cm" points="882,182 882,160 860,160" fill="none" stroke="#6e40c9" stroke-width="1.5"/>

  <!-- ── TITLE GLOW LAYER (purple bloom) ─────── -->
  <text x="450" y="112" text-anchor="middle"
        font-family="Arial Black,Arial,Helvetica,sans-serif"
        font-size="82" font-weight="900" letter-spacing="-3"
        fill="#7b52e0" opacity="0.55" filter="url(#pglow)">XeroLinux</text>

  <!-- ── TITLE MAIN (white) ─────────────────── -->
  <text class="title" x="450" y="112" text-anchor="middle"
        font-family="Arial Black,Arial,Helvetica,sans-serif"
        font-size="82" font-weight="900" letter-spacing="-3"
        fill="#f0f6fc">XeroLinux</text>

  <!-- ── SUBTITLE ───────────────────────────── -->
  <text class="sub" x="450" y="152" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="12" fill="#7b52e0" letter-spacing="6">LINUX  DEVELOPER  &amp;  OPEN  SOURCE  MAINTAINER</text>

  <!-- ── BOTTOM TAG ─────────────────────────── -->
  <text class="tag" x="450" y="175" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="10" fill="#3d2060" letter-spacing="3">xerolinux.xyz  ·  github.com/XeroLinux</text>

</svg>
